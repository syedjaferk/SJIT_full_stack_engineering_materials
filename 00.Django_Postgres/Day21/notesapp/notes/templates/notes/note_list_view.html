<h1>All Notes</h1>

<a href="{% url 'create' %}">Create Note</a>

<ul>
	{% for note in notes %}
		<li>
			<a href="{% url 'details' note.pk %}?page={{page_obj.number}}">
				{{ note.title }}
			</a>

			<a href="{% url 'update-view' note.pk %}">
				Edit
			</a>

			<a href="{% url 'delete-view' note.pk %}">
				Delete
			</a>
			
		</li>
	{% endfor %}
</ul>

{% if is_paginated %}
	<!-- Previous Page -->
	{% if page_obj.has_previous %}
	
		<a href="?page={{ page_obj.previous_page_number }}">
			previous
		</a>
	{% endif %}

	<!-- Current Page -->

	Page {{ page_obj.number }} of {{ page_obj.paginator.num_pages }}

	<!-- Next Page -->
	{% if page_obj.has_next %}
	
		<a href="?page={{ page_obj.next_page_number }}">
			next
		</a>
	{% endif %}

{% endif %}
