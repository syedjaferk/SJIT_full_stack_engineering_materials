<a href="{% url 'student_add_view' %}"> Add Student </a>

<h1>Student List</h1>

<ul>
    {% for student in students %}
    <li>
        {{ student.name }} - {{ student.email }} - {{ student.age }} -
        <a href="{% url 'student_update_view' student.id %}"> Edit </a>
        <a href="{% url 'student_delete_view' student.id %}"> Delete </a>
    </li>
    {% endfor %}
    <!--Jinja Templates-->
</ul>
